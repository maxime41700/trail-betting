<!-- styles.html -->

<!-- === START: header === -->
<style>

    /* Section main */
    header.stAppHeader {
        background-color: transparent;
    }
    section.stMain .block-container {
        padding-top: 0rem;
    } 

</style>
<!-- === END: header === -->

<!-- === START: sidebar === -->
<style>

    /* Largeur fixe */
    section[data-testid = "stSidebar"] {
        width: 200px !important;
    }
    /* Ombre */
    [data-testid = "stSidebar"] > div:first-child {
        box-shadow: 4px 0 8px #b2b2b9;
    }
    /* Couleur du fond */
    [data-testid = "stSidebarContent"] {
        background-color: #9bc7a4c4;
    }
    /* Couleur du menu */
    [data-testid = "stSidebarNav"] span {
        color: #000000 !important;
        font-size: 16px !important;
    }

    /* Titre du menu */
    [data-testid = "stNavSectionHeader"] {
        font-family: system-ui;
        font-weight: bold !important;
        font-size: 24px !important;
    }
</style>
<!-- === END: sidebar === -->


<!-- === START: hero === -->
<style>

    /* Conteneur principal du bloc hero */
    .hero {
        text-align: center;
        padding: 0rem 0rem 2rem;
    }

    /* Titre principal */
    .hero-titre {
        font-family: system-ui;
        font-size: 40px !important;
        font-weight: 700;
        margin: 0.5rem 0;
        color: #000000;
    }

    /* Phrase sous le titre */
    .hero-tagline {
        font-family: system-ui;
        font-style: oblique;
        font-weight: 500;
        color: #D20606;
        margin: 0.25rem 0 0.75rem;
        letter-spacing: 0.05em;
    }

    /* Description longue */
    .hero-description {
        font-family: system-ui;
        color: #55545a;
        margin: 0 auto;
    }

</style>
<!-- === END: hero === -->


<!-- === START: footer === -->
<style>

/* Conteneur footer fixé en bas de page */
    .footer-image {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100vw;
        pointer-events: none;  /* évite que le footer bloque les clics */
    }

    .footer-image img {
        object-fit: contain;
        opacity: 0.6; /* optionnel: transparence pour un effet "fond" */
    }

</style>
<!-- === END: footer === -->
